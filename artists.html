<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://assets.tcgdex.net https://images.pokemontcg.io https://raw.githubusercontent.com; connect-src 'self' https://api.tcgdex.net https://pokeapi.co https://economia.awesomeapi.com.br https://*.supabase.co; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.artists">Artistas - TCG Collector</title>
    <meta name="description" content="Cartas de Pokémon TCG agrupadas por ilustrador, com progresso de coleção por artista.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://assets.tcgdex.net">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0d0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCG Collector">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html">TCG&nbsp;Collector</a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="artists"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
        </div>
      </div>
    </header>

    <main>
      <section class="page-search">
        <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        <input id="searchInput" type="search" data-i18n-placeholder="search.placeholder.artists" placeholder="Artista, carta, set, número...">
      </section>

      <div class="page-head">
        <h1 data-i18n="nav.artists">Artistas</h1>
      </div>

      <section class="stats-grid" aria-label="Resumo da coleção">
        <article>
          <span id="ownedCount">0</span>
          <p data-i18n="stats.owned">cartas marcadas</p>
        </article>
        <article>
          <span id="totalCount">0</span>
          <p data-i18n="stats.total">cartas no catálogo</p>
        </article>
        <article>
          <span id="completionRate">0%</span>
          <p data-i18n="stats.progress">progresso</p>
        </article>
      </section>

      <section class="toolbar" aria-label="Filtros">
      </section>

      <section class="results-header">
        <h2 data-i18n="results.heading.artists">Artistas</h2>
        <p id="resultCount">0 resultados</p>
      </section>

      <section id="cardGrid" class="group-grid" data-view="artists" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" data-i18n="empty.artists" hidden>Nenhum artista encontrado com esses filtros.</p>
    </main>

    <script src="data/cards.js"></script>
    <script src="data/indexes.js"></script>
    <script src="src/shared.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
