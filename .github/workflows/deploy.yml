name: Build e deploy (Cloudflare Pages)

on:
  push:
    # main -> produção; qualquer outra branch -> preview (URL própria).
    # Mudanças só de documentação não disparam build/deploy.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  schedule:
    # toda segunda às 06:00 UTC — atualiza o catálogo com sets novos (na main).
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# Opta as actions JS para o Node 24 (o runner vai forçar isso a partir de
# 16/09/2026); evita o aviso de deprecação do Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Uma execução por branch (um push novo na mesma branch cancela o anterior).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      # Actions pinadas por SHA (supply chain); o comentário marca a versão.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # O cache incremental do sync (payloads brutos da TCGdex + preços por set
      # da PPT) faz os deploys levarem minutos em vez de refazer tudo. Restore e
      # save SÃO SEPARADOS de proposito: o save roda ANTES da limpeza que apaga
      # data/.cache (com o actions/cache combinado, o save automatico rodava no
      # POST, depois do rm, e salvava vazio — o cache nunca persistia).
      - name: Restaura cache (TCGdex + PPT)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/.cache
          key: tcgdex-cache-${{ github.run_id }}
          restore-keys: tcgdex-cache-

      - name: Sincroniza catálogos (en, ja, zh-tw, pt)
        run: |
          node scripts/sync-tcgdex.mjs en
          node scripts/sync-tcgdex.mjs ja
          node scripts/sync-tcgdex.mjs zh-tw
          node scripts/sync-tcgdex.mjs pt

      - name: Atualiza mapas de tipos e nomes de Pokémon
        run: |
          node scripts/sync-pokemon-types.mjs
          node scripts/sync-pokemon-names.mjs

      # Preços de mercado BR (MYP). NO-OP enquanto o secret MYP_API_TOKEN nao
      # existir — o script sai com sucesso e o merge segue só com a referencia
      # internacional. Quando o token chegar, o BR passa a ter prioridade no valor.
      - name: Sincroniza preços BR (MYP)
        env:
          MYP_API_TOKEN: ${{ secrets.MYP_API_TOKEN }}
        run: node scripts/sync-myp.mjs pokemon

      # Preços/imagens JP da PokemonPriceTracker, onde a TCGdex falha (preço-lixo
      # do Cardmarket e imagens faltando, ex.: era Mega). NO-OP sem o secret.
      # Incremental: cacheia por set em data/.cache/ppt (preservado entre runs) e
      # respeita um orçamento de créditos/run pra nunca estourar o limite do plano.
      - name: Sincroniza preços/imagens JP (PPT)
        env:
          PPT_API_TOKEN: ${{ secrets.PPT_API_TOKEN }}
        run: node scripts/sync-ppt.mjs --budget 8000 --graded

      - name: Mescla catálogos num manifest unificado
        run: node scripts/merge-catalogs.mjs en ja zh-tw pt

      # Histórico de preços SEM servidor: busca o acumulador publicado no deploy
      # anterior (a produção é o "banco"), anexa o snapshot de hoje e re-publica
      # (+ deltas ▲▼ e maiores altas/quedas). Backup em data/.cache.
      - name: Snapshot de preços (histórico Pokémon)
        run: node scripts/sync-price-history.mjs data

      # Catálogo do Lorcana (Lorcast). Independente do Pokémon; gera data/lorcana/
      # cards/indexes/pricing + .generated (modo prod). Não derruba o build se a
      # API comunitária estiver fora (mantém o cards.js versionado).
      - name: Sincroniza catálogo do Lorcana (Lorcast)
        run: node scripts/sync-lorcana.mjs || echo "sync-lorcana falhou; mantém o catalogo versionado"

      - name: Snapshot de preços (histórico Lorcana)
        run: node scripts/sync-price-history.mjs data/lorcana

      # SEO: pré-renderiza uma página HTML estática por set do Pokémon em /set/<slug>.html
      # (title, meta, Open Graph, JSON-LD e a lista de cartas já no HTML) + regenera o
      # sitemap.xml com todas as URLs. Assim o Google indexa "Base Set", "151" etc. em vez
      # da casca vazia da SPA. Lê os chunks data/sets/** gerados acima.
      - name: Pré-renderiza páginas de set (SEO)
        run: node scripts/prerender-catalog.mjs

      # Salva o cache AGORA (data/.cache ainda existe; a limpeza apaga depois).
      - name: Salva cache (TCGdex + PPT)
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/.cache
          key: tcgdex-cache-${{ github.run_id }}

      # O game.js injeta o catálogo em runtime por jogo; em produção ele carrega
      # os arquivos .generated mesclados em vez dos crus. Basta flipar a flag.
      # PRECISA rodar antes da minificação (o padrão com espaços some no minify).
      - name: Ativa modo manifest (flag no game.js)
        run: sed -i 's|var MANIFEST = false|var MANIFEST = true|' src/game.js

      # Minifica JS/CSS servidos, IN PLACE (as URLs não mudam; o repo fica intacto —
      # isso só existe no workspace do runner). Corta ~50% do transfer e acelera o
      # parse no mobile. Bônus: o esbuild FALHA em erro de sintaxe, então este passo
      # também barra deploy de código quebrado. Sourcemaps pra debugar produção.
      # --charset=utf8 mantém os acentos/emoji do i18n como UTF-8 (todas as páginas
      # declaram <meta charset="utf-8">; SWs são decodificados como UTF-8 por spec).
      - name: Minifica JS e CSS
        run: |
          npx --yes esbuild --minify --sourcemap --charset=utf8 --allow-overwrite --outdir=src src/*.js
          npx --yes esbuild --minify --charset=utf8 --allow-overwrite --outfile=styles.css styles.css
          npx --yes esbuild --minify --sourcemap --charset=utf8 --allow-overwrite --outfile=sw.js sw.js

      - name: Remove arquivos que não vão para o site
        run: rm -rf .git .github .claude data/.cache data/cards.generated.js scripts

      # Deploy no Cloudflare Pages. main = produção; outras branches = preview
      # (URL única <hash>.tcg-collector.pages.dev). Pulado se o secret faltar.
      - name: Deploy para Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' }}
        run: |
          npx --yes wrangler@3 pages project create tcg-collector --production-branch=main 2>/dev/null || true
          npx --yes wrangler@3 pages deploy . --project-name=tcg-collector --branch="${{ github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
