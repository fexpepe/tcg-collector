name: Build e deploy (Cloudflare Pages)

on:
  push:
    # main -> produção; qualquer outra branch -> preview (URL própria).
    # Mudanças só de documentação não disparam build/deploy.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  schedule:
    # toda segunda às 06:00 UTC — atualiza o catálogo com sets novos (na main).
    - cron: "0 6 * * 1"
    # sexta às 21:00 UTC — dia de lançamento de set do Pokémon TCG; pega o set
    # novo (ex.: Pitch Black, 17/07/2026) assim que a TCGdex publica, sem
    # esperar segunda nem depender de um push manual.
    - cron: "0 21 * * 5"
  workflow_dispatch:

permissions:
  contents: write # o build commita o snapshot do catálogo Pokémon de volta (ver passo "Versiona")

# Opta as actions JS para o Node 24 (o runner vai forçar isso a partir de
# 16/09/2026); evita o aviso de deprecação do Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Uma execução por branch (um push novo na mesma branch cancela o anterior).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      # Actions pinadas por SHA (supply chain); o comentário marca a versão.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # O cache incremental do sync (payloads brutos da TCGdex + preços por set
      # da PPT) faz os deploys levarem minutos em vez de refazer tudo. Restore e
      # save SÃO SEPARADOS de proposito: o save roda ANTES da limpeza que apaga
      # data/.cache (com o actions/cache combinado, o save automatico rodava no
      # POST, depois do rm, e salvava vazio — o cache nunca persistia).
      - name: Restaura cache (TCGdex + PPT)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/.cache
          key: tcgdex-cache-${{ github.run_id }}
          restore-keys: tcgdex-cache-

      # zh-cn (simplificado) é o CHINÊS PADRÃO do site; zh-tw (tradicional) é
      # fundido dentro do mesmo "Chinês" — por isso o zh-cn vem antes no merge.
      - name: Sincroniza catálogos (en, ja, zh-cn, zh-tw, pt)
        run: |
          node scripts/sync-tcgdex.mjs en
          node scripts/sync-tcgdex.mjs ja
          node scripts/sync-tcgdex.mjs zh-cn
          node scripts/sync-tcgdex.mjs zh-tw
          node scripts/sync-tcgdex.mjs pt

      - name: Atualiza mapas de tipos e nomes de Pokémon
        run: |
          node scripts/sync-pokemon-types.mjs
          node scripts/sync-pokemon-names.mjs

      # Preços de mercado BR (MYP). NO-OP enquanto o secret MYP_API_TOKEN nao
      # existir — o script sai com sucesso e o merge segue só com a referencia
      # internacional. Quando o token chegar, o BR passa a ter prioridade no valor.
      - name: Sincroniza preços BR (MYP)
        env:
          MYP_API_TOKEN: ${{ secrets.MYP_API_TOKEN }}
        run: node scripts/sync-myp.mjs pokemon

      # Preços/imagens JP da PokemonPriceTracker, onde a TCGdex falha (preço-lixo
      # do Cardmarket e imagens faltando, ex.: era Mega). NO-OP sem o secret.
      # Incremental: cacheia por set em data/.cache/ppt (preservado entre runs) e
      # respeita um orçamento de créditos/run pra nunca estourar o limite do plano.
      - name: Sincroniza preços/imagens JP (PPT)
        env:
          PPT_API_TOKEN: ${{ secrets.PPT_API_TOKEN }}
        run: node scripts/sync-ppt.mjs --budget 8000 --graded

      - name: Mescla catálogos num manifest unificado
        run: node scripts/merge-catalogs.mjs en ja zh-cn zh-tw pt

      # Espelha logos/símbolos de SET do Pokémon localmente (independência da
      # TCGdex; as CARTAS seguem remotas). Roda DEPOIS do merge (que reescreve os
      # chunks) e reescreve setLogo/setSymbol pros caminhos em data/set-logos/.
      # Idempotente: baixa só o que falta (versionado) e re-localiza as URLs que
      # o sync trouxe de volta remotas. Não derruba o build se o CDN estiver fora.
      - name: Espelha logos de set (Pokémon)
        run: node scripts/mirror-set-logos.mjs || echo "mirror-set-logos falhou; segue com as URLs da TCGdex"

      # Histórico de preços SEM servidor: busca o acumulador publicado no deploy
      # anterior (a produção é o "banco"), anexa o snapshot de hoje e re-publica
      # (+ deltas ▲▼ e maiores altas/quedas). Backup em data/.cache.
      - name: Snapshot de preços (histórico Pokémon)
        run: node scripts/sync-price-history.mjs data

      # Catálogo do Lorcana (Lorcast). Independente do Pokémon; gera data/lorcana/
      # cards/indexes/pricing + .generated (modo prod). Não derruba o build se a
      # API comunitária estiver fora (mantém o cards.js versionado).
      - name: Sincroniza catálogo do Lorcana (Lorcast)
        run: node scripts/sync-lorcana.mjs || echo "sync-lorcana falhou; mantém o catalogo versionado"

      - name: Snapshot de preços (histórico Lorcana)
        run: node scripts/sync-price-history.mjs data/lorcana

      # Catálogo do One Piece (TCGCSV, espelho público do TCGplayer — cat. 68).
      # Gera data/onepiece/ cards/indexes/pricing + .generated com preços USD.
      # Não derruba o build se o espelho estiver fora (mantém o catálogo versionado).
      - name: Sincroniza catálogo do One Piece (TCGCSV)
        run: node scripts/sync-onepiece.mjs || echo "sync-onepiece falhou; mantém o catalogo versionado"

      # One Piece VINTAGE: Carddass Hyper Battle (1999–2002). Sem API/preço aberto;
      # a checklist vem do Grand Line Wiki (cache em data/.cache). ANEXA as cartas
      # vintage ao catálogo do One Piece (roda DEPOIS do sync-onepiece). Sem preço.
      - name: Anexa catálogo vintage do One Piece (Carddass)
        run: node scripts/sync-onepiece-vintage.mjs || echo "sync-onepiece-vintage falhou; segue sem o vintage"

      # Espelha as imagens vintage localmente (1x; reuso via data/.cache entre
      # builds). Se espelhar algo novo, refaz o build vintage pra apontar pro local.
      - name: Espelha imagens vintage (Carddass)
        run: (node scripts/mirror-vintage-images.mjs && node scripts/sync-onepiece-vintage.mjs --no-fetch) || echo "mirror falhou; segue com wsrv"

      # One Piece VINTAGE #2: o One Piece Card Game de 2002–2005 (verso madeira),
      # ~1330 cartas em 22 sets, da mesma checklist do Grand Line Wiki. Anexa ao
      # catálogo (dedupe pelo prefixo op2002-, coexiste com o Carddass). Sem preço.
      - name: Anexa catálogo One Piece Card Game 2002 (vintage)
        run: node scripts/sync-onepiece-2002.mjs || echo "sync-onepiece-2002 falhou; segue sem o 2002"

      - name: Snapshot de preços (histórico One Piece)
        run: node scripts/sync-price-history.mjs data/onepiece

      # Naruto (TCGCSV): só sincroniza quando a categoria existir (secret/var
      # NARUTO_TCGCSV_CATEGORY). Sem categoria, o script sai sem mexer em nada.
      - name: Sincroniza catálogo do Naruto (TCGCSV, se configurado)
        run: node scripts/sync-naruto.mjs || echo "sync-naruto falhou; mantém o catalogo versionado"
        env:
          NARUTO_TCGCSV_CATEGORY: ${{ vars.NARUTO_TCGCSV_CATEGORY }}

      # Naruto VINTAGE: NARUTO カードゲーム (Bandai 2003–2006), checklist do
      # tcg-db.nikita.jp (snapshot versionado, não regride). ANEXA ao catálogo do
      # Naruto (roda DEPOIS do sync-naruto). Imagens via wsrv.nl. Sem preço.
      - name: Anexa catálogo vintage do Naruto (Bandai 2003)
        run: node scripts/sync-naruto-vintage.mjs || echo "sync-naruto-vintage falhou; segue com o snapshot versionado"

      # Miracle Battle Carddass (2009-2015): linhas ONE PIECE, NARUTO e
      # HUNTER x HUNTER do jogo crossover da Jump, anexadas como vintage nos
      # catalogos de cada jogo (roda DEPOIS dos syncs deles). O catalogo do
      # HUNTER x HUNTER nasce AQUI (data/hxh/). Fonte tcg-db, sem preco.
      - name: Anexa Miracle Battle Carddass (One Piece + Naruto + Hunter x Hunter)
        run: node scripts/sync-miracle-battle.mjs || echo "sync-miracle-battle falhou; segue com o snapshot versionado"

      # Data Carddass NARUTO (arcade, 2005-2008): checklist do noihjp (fa site),
      # sem imagens. Anexa ao catalogo do Naruto (roda DEPOIS dos outros).
      - name: Anexa Data Carddass NARUTO (arcade)
        run: node scripts/sync-naruto-datacarddass.mjs || echo "sync-naruto-datacarddass falhou; segue com o snapshot versionado"

      # Data Carddass NARUTO — Formation (2007-08) e Cross (2009-10): snapshot
      # versionado do catalogo do Suruga-ya (re-coleta manual; anti-bot barra
      # fetch em CI). Anexa as duas linhas ao catalogo do Naruto.
      - name: Anexa Data Carddass Formation + Cross
        run: node scripts/sync-naruto-dc-cross-formation.mjs || echo "sync formation/cross falhou; segue com o snapshot versionado"

      # JUMP: compila os sets curados versionados (data/jump/curated/*.json).
      - name: Compila catálogo JUMP (curadoria)
        run: node scripts/build-jump.mjs || echo "build-jump falhou; mantém o catalogo versionado"

      # Lint dos catálogos: FALHA o deploy em corrupção dura (ids duplicados,
      # catálogo zerado) — contrapeso dos "|| echo" de resiliência acima.
      - name: Lint dos catálogos
        run: node scripts/lint-catalog.mjs

      # Durabilidade: versiona o catálogo VALIDADO de volta no repo (chunks do
      # Pokémon + cards/indexes/pricing dos outros jogos; o .gitignore filtra
      # caches e .generated). Junto com a união preservadora do sync-tcgdex
      # ("carta que some da API é mantida"), garante que carta indexada nunca
      # desaparece — API morreu = catálogo congela, nenhum item de portfólio
      # some. Só na main; o marcador skip-ci na mensagem evita loop de deploy.
      # Push direto, sem rebase (o workspace do build fica sujo de propósito):
      # numa race com push manual, pula — o próximo build versiona.
      - name: Versiona snapshot do catálogo
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Catálogo sem mudanças — nada a versionar."
          else
            git commit -m "Catálogo: snapshot automático do build [skip ci]"
            git push origin HEAD:main && echo "Snapshot versionado." \
              || echo "Push rejeitado (race com outro push); o próximo build versiona."
          fi

      # SEO: pré-renderiza uma página HTML estática por set — Pokémon, Lorcana e
      # One Piece — em /set/<slug>.html (title, meta, Open Graph, JSON-LD e a lista
      # de cartas já no HTML) + regenera o sitemap.xml com todas as URLs. Assim o
      # Google indexa "Base Set", "Romance Dawn" etc. em vez da casca vazia da SPA.
      # Lê os chunks data/sets/** (Pokémon) e data/{lorcana,onepiece}/cards.js.
      - name: Pré-renderiza páginas de set (SEO)
        run: node scripts/prerender-catalog.mjs

      # Salva o cache AGORA (data/.cache ainda existe; a limpeza apaga depois).
      - name: Salva cache (TCGdex + PPT)
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/.cache
          key: tcgdex-cache-${{ github.run_id }}

      # O game.js injeta o catálogo em runtime por jogo; em produção ele carrega
      # os arquivos .generated mesclados em vez dos crus. Basta flipar a flag.
      # PRECISA rodar antes da minificação (o padrão com espaços some no minify).
      - name: Ativa modo manifest (flag no game.js)
        run: sed -i 's|var MANIFEST = false|var MANIFEST = true|' src/game.js

      # Minifica JS/CSS servidos, IN PLACE (as URLs não mudam; o repo fica intacto —
      # isso só existe no workspace do runner). Corta ~50% do transfer e acelera o
      # parse no mobile. Bônus: o esbuild FALHA em erro de sintaxe, então este passo
      # também barra deploy de código quebrado. Sourcemaps pra debugar produção.
      # --charset=utf8 mantém os acentos/emoji do i18n como UTF-8 (todas as páginas
      # declaram <meta charset="utf-8">; SWs são decodificados como UTF-8 por spec).
      - name: Minifica JS e CSS
        run: |
          npx --yes esbuild --minify --sourcemap --charset=utf8 --allow-overwrite --outdir=src src/*.js
          npx --yes esbuild --minify --charset=utf8 --allow-overwrite --outfile=styles.css styles.css
          npx --yes esbuild --minify --sourcemap --charset=utf8 --allow-overwrite --outfile=sw.js sw.js

      - name: Remove arquivos que não vão para o site
        run: rm -rf .git .github .claude data/.cache data/cards.generated.js scripts

      # Deploy no Cloudflare Pages. main = produção; outras branches = preview
      # (URL única <hash>.tcg-collector.pages.dev). Pulado se o secret faltar.
      - name: Deploy para Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' }}
        run: |
          npx --yes wrangler@3 pages project create tcg-collector --production-branch=main 2>/dev/null || true
          npx --yes wrangler@3 pages deploy . --project-name=tcg-collector --branch="${{ github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
