name: Build e deploy (catálogo TCGdex)

on:
  push:
    branches: [main]
  schedule:
    # toda segunda às 06:00 UTC — atualiza o catálogo com sets novos
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Permissão padrão mínima para todos os jobs; só o deploy pede o que precisa a mais.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinadas por SHA (supply chain); o comentário marca a versão.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      # O cache incremental do sync (payloads brutos por set) faz os deploys
      # de push levarem minutos em vez de refazer toda a TCGdex.
      - name: Restaura cache da TCGdex
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: data/.cache
          key: tcgdex-cache-${{ github.run_id }}
          restore-keys: tcgdex-cache-

      - name: Sincroniza catálogos (en, ja, zh-tw, pt)
        run: |
          node scripts/sync-tcgdex.mjs en
          node scripts/sync-tcgdex.mjs ja
          node scripts/sync-tcgdex.mjs zh-tw
          node scripts/sync-tcgdex.mjs pt

      - name: Atualiza mapas de tipos e nomes de Pokémon
        run: |
          node scripts/sync-pokemon-types.mjs
          node scripts/sync-pokemon-names.mjs

      - name: Mescla catálogos num manifest unificado
        run: node scripts/merge-catalogs.mjs en ja zh-tw pt

      - name: Ativa modo manifest nas páginas
        run: |
          sed -i 's|data/cards\.js|data/manifest.generated.js|g; s|data/indexes\.js|data/indexes.generated.js|g' \
            index.html pokedex.html sets.html artists.html trainers.html collection.html wishlist.html portfolio.html detail.html \
            binders-collection.html binders-sale.html

      - name: Remove arquivos que não vão para o site
        run: rm -rf .git .github .claude data/.cache data/cards.generated.js scripts

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Privilégios elevados ficam só no job que publica no Pages.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
