name: Healthcheck de produção

on:
  schedule:
    # Diário 10:00 UTC — depois do deploy semanal de segunda (06:00) e do push
    # de wishlist (09:00), então pega o site já no estado "final" do dia.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      # Falhou = job vermelho -> e-mail do GitHub pro dono do repo.
      - name: Valida produção (páginas, catálogos, preços, Supabase)
        run: node scripts/healthcheck.mjs
