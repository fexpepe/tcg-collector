name: CI (testes + checks)

# Portão de qualidade rápido (< 1 min), separado do deploy: roda em TODO push e
# PR, sem tocar produção. O deploy continua sendo o pipeline pesado da main.
on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "data/sets/**" # snapshot automático do catálogo não precisa de CI
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Testes unitários (node:test)
        run: node --test tests/sync-common.test.mjs tests/shared-stores.test.mjs tests/csv-import.test.mjs

      - name: Testes do merge de sync (LWW + tombstones)
        run: node scripts/test-sync-merge.mjs

      - name: Smoke estático (sintaxe + i18n pt/en + ordem de scripts)
        run: node scripts/check.mjs

      - name: Sintaxe dos scripts de build
        run: for f in scripts/*.mjs scripts/lib/*.mjs; do node --check "$f"; done

      - name: Minificação compila (esbuild barra JS quebrado)
        run: |
          npx --yes esbuild --minify --charset=utf8 --outdir=/tmp/ci-min src/*.js
          npx --yes esbuild --minify --charset=utf8 --outfile=/tmp/ci-sw.js sw.js
