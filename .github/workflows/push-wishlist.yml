name: Push semanal de quedas da wishlist

on:
  schedule:
    # Segunda 09:00 UTC — DEPOIS do deploy semanal (06:00) que renova os
    # price-deltas; assim o aviso usa a variação fresca da semana.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Instala web-push
        run: npm install --no-save web-push@3
      - name: Envia notificações
        env:
          PUSH_SENDER_KEY: ${{ secrets.PUSH_SENDER_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node scripts/send-wishlist-push.mjs
