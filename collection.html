<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.collection">Coleção - TCG Collector</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow" data-i18n="header.tagline">Local-first MVP</p>
        <h1 data-i18n="nav.collection">Coleção</h1>
      </div>
      <div class="header-actions">
        <select id="languageSwitcher" class="lang-select"></select>
        <button id="exportButton" class="secondary" data-i18n="header.export">Exportar</button>
        <label class="secondary file-button">
          <span data-i18n="header.import">Importar</span>
          <input id="importInput" type="file" accept="application/json">
        </label>
      </div>
    </header>

    <main>
      <nav class="page-nav" aria-label="Páginas">
        <a href="index.html" data-i18n="nav.home">Início</a>
        <a href="pokedex.html" data-i18n="nav.pokedex">Pokédex</a>
        <a href="sets.html" data-i18n="nav.sets">Sets</a>
        <a href="artists.html" data-i18n="nav.artists">Artistas</a>
        <a class="active" href="collection.html" data-i18n="nav.collection">Coleção</a>
      </nav>

      <section class="stats-grid" aria-label="Resumo da coleção">
        <article>
          <span id="distinctCount">0</span>
          <p data-i18n="stats.distinct">cartas distintas</p>
        </article>
        <article>
          <span id="copiesCount">0</span>
          <p data-i18n="stats.copies">cópias no total</p>
        </article>
        <article>
          <span id="setsCount">0</span>
          <p data-i18n="stats.setsCovered">sets representados</p>
        </article>
      </section>

      <section class="toolbar" aria-label="Filtros">
        <div class="search-box">
          <label for="searchInput" data-i18n="toolbar.search">Busca</label>
          <input id="searchInput" type="search" data-i18n-placeholder="search.placeholder.detail" placeholder="Carta, set, artista, número...">
        </div>
        <div>
          <label for="pokemonFilter" data-i18n="toolbar.pokemon">Pokémon</label>
          <select id="pokemonFilter">
            <option value="" data-i18n="filter.all.m">Todos</option>
          </select>
        </div>
        <div>
          <label for="setFilter" data-i18n="toolbar.set">Set</label>
          <select id="setFilter">
            <option value="" data-i18n="filter.all.m">Todos</option>
          </select>
        </div>
        <div>
          <label for="languageFilter" data-i18n="toolbar.language">Idioma</label>
          <select id="languageFilter">
            <option value="" data-i18n="filter.all.m">Todos</option>
          </select>
        </div>
        <div>
          <label for="rarityFilter" data-i18n="toolbar.rarity">Raridade</label>
          <select id="rarityFilter">
            <option value="" data-i18n="filter.all.f">Todas</option>
          </select>
        </div>
      </section>

      <section class="results-header">
        <h2 data-i18n="results.heading.detail">Cartas</h2>
        <p id="resultCount">0 resultados</p>
      </section>

      <section id="cardGrid" class="card-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" data-i18n="empty.collection" hidden>Nenhuma carta da sua coleção com esses filtros. Explore a Pokédex e marque o que você tem.</p>
    </main>

    <script src="data/cards.js"></script>
    <script src="data/indexes.js"></script>
    <script src="src/shared.js"></script>
    <script src="src/collection.js"></script>
  </body>
</html>
