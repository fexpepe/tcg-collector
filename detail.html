<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://assets.tcgdex.net https://images.pokemontcg.io https://raw.githubusercontent.com; connect-src 'self' https://api.tcgdex.net https://pokeapi.co https://economia.awesomeapi.com.br https://*.supabase.co; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.detail">Detalhe - TCG Collector</title>
    <meta name="description" content="Detalhes e cartas de um Pokémon, set ou artista no TCG Collector.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://assets.tcgdex.net">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0d0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCG Collector">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html">TCG&nbsp;Collector</a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="detail"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
        </div>
      </div>
    </header>

    <main>
      <section class="page-search">
        <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        <input id="searchInput" type="search" data-i18n-placeholder="search.placeholder.detail" placeholder="Carta, set, artista, número...">
      </section>

      <div class="page-head">
        <a id="detailBack" class="detail-back-link" href="pokedex.html" data-i18n="detail.back">← Voltar</a>
        <p id="detailType" class="eyebrow" data-i18n="detail.label">Detalhe</p>
        <h1 id="detailTitle" data-i18n="detail.loading">Carregando</h1>
      </div>

      <div class="detail-summary">
        <section id="detailHero" class="detail-hero" hidden></section>

        <section class="stats-grid detail-stats" aria-label="Resumo da coleção">
          <article>
            <span id="ownedCount">0</span>
            <p data-i18n="stats.owned">cartas marcadas</p>
          </article>
          <article>
            <span id="totalCount">0</span>
            <p data-i18n="stats.pageTotal">cartas nessa página</p>
          </article>
          <article>
            <span id="completionRate">0%</span>
            <p data-i18n="stats.progress">progresso</p>
          </article>
        </section>

        <section id="detailValues" class="stats-grid detail-values" aria-label="Valores" hidden>
          <article>
            <span id="valueTotal">—</span>
            <p data-i18n="value.total">Valor total</p>
          </article>
          <article>
            <span id="valueOwned">—</span>
            <p data-i18n="value.owned">Já gasto (tenho)</p>
          </article>
          <article>
            <span id="valueToBuy">—</span>
            <p data-i18n="value.toBuy">Falta (a comprar)</p>
          </article>
        </section>
      </div>

      <section class="toolbar detail-toolbar" aria-label="Filtros">
        <div>
          <label data-i18n="toolbar.collection">Coleção</label>
          <div id="ownedChips" class="segmented" role="group" aria-label="Coleção"></div>
        </div>
        <div>
          <label for="languageFilter" data-i18n="toolbar.language">Idioma</label>
          <select id="languageFilter">
            <option value="" data-i18n="filter.all.m">Todos</option>
          </select>
        </div>
        <div id="rarityField" hidden>
          <label for="rarityFilter" data-i18n="toolbar.rarity">Raridade</label>
          <select id="rarityFilter">
            <option value="" data-i18n="filter.all.f">Todas</option>
          </select>
        </div>
        <div class="sort-select">
          <label for="sortSelect" data-i18n="sort.label">Ordenar:</label>
          <select id="sortSelect">
            <option value="release" data-i18n="sort.releaseDate">Lançamento</option>
            <option value="value-desc" data-i18n="sort.valueDesc">Valor (maior → menor)</option>
            <option value="value-asc" data-i18n="sort.valueAsc">Valor (menor → maior)</option>
            <option value="num-desc" data-i18n="sort.numDesc">Nº da carta (maior → menor)</option>
            <option value="num-asc" data-i18n="sort.numAsc">Nº da carta (menor → maior)</option>
          </select>
        </div>
        <div class="view-toggle-field">
          <label data-i18n="toolbar.view">Visualização</label>
          <div id="viewToggle" class="view-toggle" role="group" aria-label="Visualização">
            <button type="button" class="view-toggle-btn" data-grid-view="grid" aria-pressed="true" aria-label="Grade" title="Grade">▦</button>
            <button type="button" class="view-toggle-btn" data-grid-view="list" aria-pressed="false" aria-label="Lista" title="Lista">≣</button>
          </div>
        </div>
      </section>

      <section class="results-header">
        <h2 data-i18n="results.heading.detail">Cartas</h2>
        <p id="resultCount">0 resultados</p>
      </section>

      <section id="detailGrid" class="card-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" data-i18n="empty.detail" hidden>Nenhuma carta encontrada nessa página.</p>
    </main>

    <script src="data/cards.js"></script>
    <script src="data/indexes.js"></script>
    <script src="data/set-id-map.js"></script>
    <script src="data/pokemon-names.js"></script>
    <script src="data/pricing.js"></script>
    <script src="src/shared.js"></script>
    <script src="src/detail.js"></script>
  </body>
</html>
