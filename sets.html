<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.sets">Sets - TCG Collector</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html">TCG&nbsp;Collector</a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="sets"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
          <button id="exportButton" class="secondary" data-i18n="header.export">Exportar</button>
          <label class="secondary file-button">
            <span data-i18n="header.import">Importar</span>
            <input id="importInput" type="file" accept="application/json">
          </label>
        </div>
      </div>
    </header>

    <main>
      <div class="page-head">
        <p class="eyebrow" data-i18n="header.tagline">Local-first MVP</p>
        <h1 data-i18n="nav.sets">Sets</h1>
      </div>

      <section class="stats-grid" aria-label="Resumo da coleção">
        <article>
          <span id="ownedCount">0</span>
          <p data-i18n="stats.owned">cartas marcadas</p>
        </article>
        <article>
          <span id="totalCount">0</span>
          <p data-i18n="stats.total">cartas no catálogo</p>
        </article>
        <article>
          <span id="completionRate">0%</span>
          <p data-i18n="stats.progress">progresso</p>
        </article>
      </section>

      <section class="toolbar" aria-label="Filtros">
        <div class="search-box">
          <label for="searchInput" data-i18n="toolbar.search">Busca</label>
          <input id="searchInput" type="search" data-i18n-placeholder="search.placeholder.sets" placeholder="Set, carta, artista, número...">
        </div>
      </section>

      <section class="results-header">
        <h2 data-i18n="results.heading.sets">Sets</h2>
        <p id="resultCount">0 resultados</p>
      </section>

      <section id="cardGrid" class="group-grid" data-view="sets" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" data-i18n="empty.sets" hidden>Nenhum set encontrado com esses filtros.</p>
    </main>

    <script src="data/cards.js"></script>
    <script src="data/indexes.js"></script>
    <script src="src/shared.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
