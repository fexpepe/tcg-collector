<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://assets.tcgdex.net https://images.pokemontcg.io https://raw.githubusercontent.com https://tcgplayer-cdn.tcgplayer.com; connect-src 'self' https://api.tcgdex.net https://pokeapi.co https://economia.awesomeapi.com.br https://*.supabase.co; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.sets">Sets - Sleevu</title>
    <meta name="description" content="Todos os sets de Pokémon TCG — internacionais, japoneses e chineses — com progresso de coleção e datas de lançamento.">
    <link rel="canonical" href="https://sleevu.app/sets">
    <meta property="og:site_name" content="Sleevu">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sleevu.app/sets">
    <meta property="og:title" content="Sets - Sleevu">
    <meta property="og:description" content="Todos os sets de Pokémon TCG — internacionais, japoneses e chineses — com progresso de coleção e datas de lançamento.">
    <meta property="og:image" content="https://sleevu.app/og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sets - Sleevu">
    <meta name="twitter:description" content="Todos os sets de Pokémon TCG — internacionais, japoneses e chineses — com progresso de coleção e datas de lançamento.">
    <meta name="twitter:image" content="https://sleevu.app/og-image.svg">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://assets.tcgdex.net">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0d0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sleevu">
    <script src="src/theme.js"></script>
    <script src="src/game.js" data-catalog="cards,indexes,pricing"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html"><img class="brand-logo" src="assets/logo.png" alt="Sleevu"></a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="sets"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
        </div>
      </div>
    </header>

    <main>
      <section class="page-search">
        <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        <input id="searchInput" type="search" data-i18n-placeholder="search.placeholder.sets" placeholder="Set, carta, artista, número...">
      </section>

      <div class="page-head">
        <h1 data-i18n="nav.sets">Sets</h1>
      </div>

      <div id="setRegionChips" class="chip-filter master-filter" role="group" aria-label="Origem dos sets">
        <button type="button" class="chip" data-lang-region="english" aria-pressed="true" data-i18n="setRegion.english">Inglês</button>
        <button type="button" class="chip" data-lang-region="portuguese" aria-pressed="false" data-i18n="setRegion.portuguese">Português</button>
        <button type="button" class="chip" data-lang-region="japanese" aria-pressed="false" data-i18n="setRegion.japanese">Japonês</button>
        <button type="button" class="chip" data-lang-region="chinese" aria-pressed="false" data-i18n="setRegion.chinese">Chinês</button>
      </div>

      <section class="stats-grid" aria-label="Resumo da coleção">
        <article>
          <span id="ownedCount">0</span>
          <p data-i18n="stats.owned">cartas marcadas</p>
        </article>
        <article>
          <span id="totalCount">0</span>
          <p data-i18n="stats.total">cartas no catálogo</p>
        </article>
        <article>
          <span id="completionRate">0%</span>
          <p data-i18n="stats.progress">progresso</p>
        </article>
      </section>

      <section class="toolbar" aria-label="Filtros">
      </section>

      <section class="results-header">
        <h2 data-i18n="results.heading.sets">Sets</h2>
        <p id="resultCount">0 resultados</p>
      </section>

      <section id="cardGrid" class="group-grid" data-view="sets" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" data-i18n="empty.sets" hidden>Nenhum set encontrado com esses filtros.</p>
    </main>

    <script defer src="src/i18n.js"></script>
    <script defer src="src/shared.js"></script>
    <script defer src="src/app.js"></script>
  </body>
</html>
