<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://assets.tcgdex.net https://images.pokemontcg.io https://raw.githubusercontent.com https://tcgplayer-cdn.tcgplayer.com https://cards.lorcast.io https://wsrv.nl; connect-src 'self' https://api.tcgdex.net https://pokeapi.co https://economia.awesomeapi.com.br https://*.supabase.co https://cloudflareinsights.com; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.explore">Explorar - Sleevu</title>
    <meta name="description" content="Busca global do Sleevu: encontre qualquer carta de qualquer jogo — Pokémon, Lorcana, One Piece e Naruto — num lugar só.">
    <link rel="canonical" href="https://sleevu.app/explore">
    <meta property="og:site_name" content="Sleevu">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sleevu.app/explore">
    <meta property="og:title" content="Explorar - Sleevu">
    <meta property="og:description" content="Busca global do Sleevu: encontre qualquer carta de qualquer jogo num lugar só.">
    <meta property="og:image" content="https://sleevu.app/og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Explorar - Sleevu">
    <meta name="twitter:description" content="Busca global do Sleevu: encontre qualquer carta de qualquer jogo num lugar só.">
    <meta name="twitter:image" content="https://sleevu.app/og-image.svg">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://assets.tcgdex.net">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#101218">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sleevu">
    <script src="src/theme.js"></script>
    <script src="src/game.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html">Sleevu</a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="explore"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
        </div>
      </div>
    </header>

    <main>
      <div class="page-head">
        <h1 data-i18n="nav.explore">Explorar</h1>
      </div>

      <section class="page-search">
        <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        <input id="exploreSearch" type="search" data-i18n-placeholder="explore.placeholder" placeholder="Qualquer carta, de qualquer jogo — nome, set, artista, número…">
      </section>

      <div class="collection-toolbar">
        <div id="exploreGameFilter" class="chip-filter game-filter" role="group" aria-label="Jogo">
          <button type="button" class="chip" data-game-filter="all" aria-pressed="true" data-i18n="filter.gameAll">Todos</button>
          <button type="button" class="chip" data-game-filter="pokemon" aria-pressed="false" data-i18n="filter.gamePokemon">Pokémon</button>
          <button type="button" class="chip" data-game-filter="lorcana" aria-pressed="false" data-i18n="filter.gameLorcana">Lorcana</button>
          <button type="button" class="chip" data-game-filter="onepiece" aria-pressed="false" data-i18n="filter.gameOnePiece">One Piece</button>
          <button type="button" class="chip" data-game-filter="naruto" aria-pressed="false" data-i18n="filter.gameNaruto">Naruto</button>
        </div>
        <div class="collection-toolbar-actions">
          <div class="sort-select">
            <label for="exploreSortSelect" data-i18n="sort.label">Ordenar:</label>
            <select id="exploreSortSelect">
              <option value="value-desc" data-i18n="sort.valueDesc">Valor (maior → menor)</option>
              <option value="value-asc" data-i18n="sort.valueAsc">Valor (menor → maior)</option>
              <option value="rarity-desc" data-i18n="sort.rarityDesc">Raridade (maior → menor)</option>
              <option value="rarity-asc" data-i18n="sort.rarityAsc">Raridade (menor → maior)</option>
              <option value="release" data-i18n="sort.releaseDate">Lançamento</option>
              <option value="num-asc" data-i18n="sort.numAsc">Nº da carta (menor → maior)</option>
            </select>
          </div>
        </div>
      </div>

      <section class="results-header" id="exploreResultsHeader" hidden>
        <h2 data-i18n="results.heading.cards">Cartas</h2>
        <p id="exploreResultCount">0 resultados</p>
      </section>

      <p id="exploreIntro" class="empty-state" data-i18n="explore.intro">Pesquise em todos os jogos de uma vez: nome da carta, set, artista ou número (ex.: OP05-119, 忍-1, Pikachu).</p>
      <section id="exploreGrid" class="card-grid" aria-live="polite"></section>
      <p id="exploreEmpty" class="empty-state" data-i18n="explore.empty" hidden>Nenhuma carta encontrada em nenhum jogo. Tente outro nome ou código.</p>
    </main>

    <script defer src="src/i18n.js"></script>
    <script defer src="src/shared.js"></script>
    <script defer src="src/explore.js"></script>
  </body>
</html>
