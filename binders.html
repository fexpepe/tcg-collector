<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://assets.tcgdex.net https://images.pokemontcg.io https://raw.githubusercontent.com https://tcgplayer-cdn.tcgplayer.com; connect-src 'self' https://api.tcgdex.net https://pokeapi.co https://economia.awesomeapi.com.br https://*.supabase.co; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.binders">Binders - TCG Collector</title>
    <meta name="description" content="Monte fichários visuais 2×2, 3×3, 4×4 e 5×5 das suas cartas de Pokémon TCG, organize por páginas e exporte como imagem ou PDF.">
    <link rel="canonical" href="https://tcg-collector.pages.dev/binders">
    <meta property="og:site_name" content="TCG Collector">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tcg-collector.pages.dev/binders">
    <meta property="og:title" content="Binders - TCG Collector">
    <meta property="og:description" content="Monte fichários visuais 2×2, 3×3, 4×4 e 5×5 das suas cartas de Pokémon TCG, organize por páginas e exporte como imagem ou PDF.">
    <meta property="og:image" content="https://tcg-collector.pages.dev/og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Binders - TCG Collector">
    <meta name="twitter:description" content="Monte fichários visuais 2×2, 3×3, 4×4 e 5×5 das suas cartas de Pokémon TCG, organize por páginas e exporte como imagem ou PDF.">
    <meta name="twitter:image" content="https://tcg-collector.pages.dev/og-image.svg">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://assets.tcgdex.net">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0d0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCG Collector">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html">TCG&nbsp;Collector</a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="binders"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
        </div>
      </div>
    </header>

    <main>
      <div class="page-head">
        <h1 data-i18n="binders.heading">Binders</h1>
      </div>
      <p class="collection-subtitle" data-i18n="binders.subtitle">Monte fichários visuais das suas cartas, organize em páginas e exporte como imagem ou PDF.</p>

      <!-- Galeria: criar + lista/grid de binders -->
      <div id="binderGallery">
        <section class="binder-toolbar" aria-label="Novo binder">
          <input id="binderName" type="text" data-i18n-placeholder="binders.namePlaceholder" placeholder="Nome do binder">
          <label class="binder-grid-label"><span data-i18n="binders.template">Template</span>
            <select id="binderTemplate"></select>
          </label>
          <label class="binder-grid-label"><span data-i18n="binders.type">Tipo</span>
            <select id="binderType"></select>
          </label>
          <label class="binder-grid-label"><span data-i18n="binders.grid">Formato</span>
            <select id="binderGrid"></select>
          </label>
          <button id="binderCreate" class="primary" data-i18n="binders.new">Novo binder</button>
        </section>

        <div class="binder-gallery-controls">
          <div class="binder-view-toggle" role="group" aria-label="Visualização">
            <button type="button" data-view="grid" class="binder-view-btn" aria-label="Grade" aria-pressed="true">▦</button>
            <button type="button" data-view="list" class="binder-view-btn" aria-label="Lista" aria-pressed="false">≣</button>
          </div>
          <label class="binder-sort-label"><span data-i18n="binders.sort">Ordenar</span>
            <select id="binderSort"></select>
          </label>
        </div>

        <p id="binderEmpty" class="empty-state" data-i18n="binders.empty" hidden>Você ainda não criou nenhum binder. Crie o primeiro acima.</p>
        <section id="binderList" class="binder-gallery" aria-live="polite"></section>
      </div>

      <!-- Detalhe: um binder aberto -->
      <div id="binderDetail" hidden>
        <div class="binder-detail-bar">
          <a class="secondary binder-back" href="binders.html"><span aria-hidden="true">←</span> <span data-i18n="binders.back">Binders</span></a>
          <div class="binder-detail-actions">
            <button type="button" id="binderShareBtn" class="secondary" data-i18n="binders.share">Compartilhar</button>
            <button type="button" id="binderSaveBtn" class="primary" data-i18n="binders.save">Salvar binder</button>
          </div>
        </div>
        <section id="binderDetailBody"></section>
      </div>
    </main>

    <script defer src="data/cards.js"></script>
    <script defer src="data/indexes.js"></script>
    <script defer src="data/set-id-map.js"></script>
    <script defer src="data/pricing.js"></script>
    <script defer src="src/i18n.js"></script>
    <script defer src="src/shared.js"></script>
    <script defer src="src/binders.js"></script>
  </body>
</html>
