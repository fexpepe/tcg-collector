<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://assets.tcgdex.net https://images.pokemontcg.io https://raw.githubusercontent.com; connect-src 'self' https://api.tcgdex.net https://pokeapi.co https://economia.awesomeapi.com.br; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="title.bindersCollection">Binders da coleção - TCG Collector</title>
    <meta name="description" content="Monte fichários visuais 2×2, 3×3 e 4×4 das suas cartas de Pokémon TCG e exporte como imagem para compartilhar.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://assets.tcgdex.net">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0d0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCG Collector">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="index.html">TCG&nbsp;Collector</a>
        <nav class="page-nav" aria-label="Páginas" data-active-page="binders-collection"></nav>
        <div class="header-actions">
          <select id="languageSwitcher" class="lang-select"></select>
        </div>
      </div>
    </header>

    <main data-binder-mode="collection">
      <div class="page-head">
        <h1 data-i18n="binders.collection.heading">Binders da coleção</h1>
      </div>
      <p class="collection-subtitle" data-i18n="binders.collection.subtitle">Monte fichários visuais das suas cartas e exporte como imagem.</p>

      <section class="binder-toolbar" aria-label="Novo binder">
        <input id="binderName" type="text" data-i18n-placeholder="binders.namePlaceholder" placeholder="Nome do binder">
        <label class="binder-grid-label"><span data-i18n="binders.grid">Formato</span>
          <select id="binderGrid"></select>
        </label>
        <button id="binderCreate" class="primary" data-i18n="binders.new">Novo binder</button>
      </section>

      <p id="binderEmpty" class="empty-state" data-i18n="binders.empty" hidden>Você ainda não criou nenhum binder. Crie o primeiro acima.</p>
      <section id="binderList" class="binder-list" aria-live="polite"></section>
    </main>

    <script src="data/cards.js"></script>
    <script src="data/indexes.js"></script>
    <script src="data/set-id-map.js"></script>
    <script src="src/shared.js"></script>
    <script src="src/binders.js"></script>
  </body>
</html>
